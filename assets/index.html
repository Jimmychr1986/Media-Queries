<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/db258a1787.js" crossorigin="anonymous"></script>
     <title>Electric Car Store</title>
</head>
<body>
    <aside>
        <div class="aside2">
            <div class="icon"><i class="fa-solid fa-car"></i></div>
            <h1>Electric Cars</h1>
        </div>

        <div class="bars">
           <i class="fa-solid fa-bars"></i>
        </div>
        <menu>
            <p>Inicio</p>
            <p>Catálogo</p>
            <p>Ofertas</p>
            <p>Contacto</p>
        </menu>
    </aside>

        <!---Filtro-->
    <section class="search-container">
            <label for= "search">Ordenar por:</label>
            <select name="search" id="carlist">
                <option value="Precio">Precio</option>
                <option value="Marca">Marca</option>
                <option value="Modelo">Modelo</option>
                <option value="Categoria">Categoria</option>
            </select>
    </section>


    <main>
        <div class="cards">
                <!---Mobile-->
                <div class="cardstop">
                    <div class="cardmobi">
                    <img class="electrico1" src="./img/electrico1.jpg" alt="electrico1">
                    <br><p>Tesla Model S Plaid</p>
                     <button>Ver más</button>
                </div>
                    <!---Tablet-->
                    <div class="cardTablet">
                    <img class="electrico2" src="./img/electrico2.jpg" alt="electrico2">
                    <br><p>Renault Megane E-Tech</p>
                     <button>Ver más</button> 
                    </div>
                    <!---Desktop-->
                    <div class="cardDesk">
                    <img class="electrico3" src="./img/electrico3.jpg" alt="electrico3">
                    <br><p>Gac Emkoo</p>
                     <button>Ver más</button>                       
                    </div>

                    <div class="cardDesk">
                    <img class="electrico4" src="./img/electrico4.jpg" alt="electrico4">
                    <br><p>Kia EV5</p>
                     <button>Ver más</button> 
                    </div>
                </div>

                <div class="cardsbottom">
                    <div class="cardDesk">
                    <img class="electrico5" src="./img/electrico5.jpg" alt="electrico5">
                    <br><p>Volvo EX30</p>
                     <button>Ver más</button> 

                    </div>
                    <div class="cardDesk">
                    <img class="electrico6" src="./img/electrico6.jpg" alt="electrico6">
                    <br><p>Toyota BZ4X</p>
                     <button>Ver más</button> 
                    </div>   

                    <div class="cardDesk">
                    <img class="electrico7" src="./img/electrico7.jpg" alt="electrico7">
                    <br><p> Ferrari Elettrica</p>
                     <button>Ver más</button> 
                    </div> 

                    <div class="cardDesk">
                    <img class="electrico8" src="./img/electrico8.jpg" alt="electrico8">
                    <br><p> Porshe Taycan Turbo</p>
                     <button>Ver más</button> 
                    </div> 
                </div>
        </div>
        <!---Pagination-->

        <div class="pagination">
            <a href="#">&laquo;</a>
            <a class="active" href="#">1</a>
            <a href="#">2</a>
            <a href="#">3</a>
            <a href="#">&raquo;</a>
        </div>
    </main>
    
</body>

        <!---Footer-->
        <footer>
            <div class="icons">
                <i class="fa-brands fa-facebook-f"></i>
                <i class="fa-brands fa-instagram"></i>
            </div>
            <div class="footer-text">Todos los derechos reservados</div>
        </footer>
</html>
