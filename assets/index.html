<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/db258a1787.js" crossorigin="anonymous"></script>
     <title>Electric Car Store</title>
</head>
<body>
    <aside>
        <div class="aside2">
            <div class="icon"><i class="fa-solid fa-car"></i></div>
            <h1>Electric Cars</h1>
        </div>

        <div class="bars">
           <i class="fa-solid fa-bars"></i>
        </div>
        <menu>
            <p>Inicio</p>
            <p>Catálogo</p>
            <p>Ofertas</p>
            <p>Contacto</p>
        </menu>
    </aside>

        <!---Filtro-->
    <section class="search-container">
            <label for= "search">Ordenar por:</label>
            <select name="search" id="carlist">
                <option value="Precio">Precio</option>
                <option value="Marca">Marca</option>
                <option value="Modelo">Modelo</option>
                <option value="Categoria">Categoria</option>
            </select>
    </section>


    <main>
        <div class="cards">
                <!---Mobile-->
                <div class="cardstop">
                    <div class="cardmobi"><p>card mobile</p></div>
                    <!---Desktop-->
                    <div class="cardDesk"><p>card Desktop2</p></div>
                    <div class="cardDesk"><p>card Desktop3</p></div>
                    <div class="cardDesk"><p>card Desktop4</p></div>
                </div>
                <div class="cardsbottom">
                    <div class="cardDesk"><p>card Desktop5</p></div>
                    <div class="cardDesk"><p>card Desktop6</p></div>   
                    <div class="cardDesk"><p>card Desktop7</p></div> 
                    <div class="cardDesk"><p>card Desktop8</p></div> 
                </div>
        </div>
        <!---Pagination-->

        <div class="pagination">
            <a href="#">&laquo;</a>
            <a class="active" href="#">1</a>
            <a href="#">2</a>
            <a href="#">3</a>
            <a href="#">&raquo;</a>
        </div>
    </main>
    
</body>

        <!---Footer-->
        <footer>
            <div class="icons">
                <i class="fa-brands fa-facebook-f"></i>
                <i class="fa-brands fa-instagram"></i>
            </div>
            <div class="footer-text">Todos los derechos reservados</div>
        </footer>
</html>
